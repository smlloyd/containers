name: Build RHEL10 bootc-kubevirt-docker image
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build RHEL10 bootc image"]
    types: [completed]
    branches: [main]
  push:
    paths:
      - bootc/rhel10/variant.Containerfile
      - bootc/common/doppler/**
      - bootc/common/tailscale/**
      - bootc/rhel-common/docker/**
      - bootc/common/kubevirt/**
    branches:
      - main

jobs:
  build_bootc:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/build-rhel-bootc.yml
    with:
      image_name: rhel10/rhel-bootc-kubevirt-docker
      build-args: |
        DISTRO_VER=10
      containerfiles: |
        bootc/rhel10/variant.Containerfile
        bootc/common/doppler/Containerfile
        bootc/common/tailscale/Containerfile
        bootc/rhel-common/docker/Containerfile
        bootc/common/kubevirt/Containerfile
    permissions:
      contents: read
      packages: write
    secrets: inherit
